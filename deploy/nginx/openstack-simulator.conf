# Nginx configuration for the OpenStack Simulator
#
# This proxies all OpenStack API requests to the gunicorn backend.
# Install: copy to /etc/nginx/sites-available/ and symlink to sites-enabled/
#
# The simulator listens on port 5000 (Keystone standard) externally,
# and proxies to gunicorn on 127.0.0.1:8000.

upstream simulator_backend {
    server 127.0.0.1:8000;
}

server {
    listen 5000;
    server_name localhost;

    # Increase body size for large API requests
    client_max_body_size 10m;

    # Identity (Keystone) - /identity/v3/
    location /identity/ {
        proxy_pass http://simulator_backend/identity/;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Compute (Nova) - /compute/v2.1/
    location /compute/ {
        proxy_pass http://simulator_backend/compute/;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Network (Neutron) - /network/v2.0/
    location /network/ {
        proxy_pass http://simulator_backend/network/;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Volume (Cinder) - /volume/v3/
    location /volume/ {
        proxy_pass http://simulator_backend/volume/;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Root discovery
    location / {
        proxy_pass http://simulator_backend/;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
