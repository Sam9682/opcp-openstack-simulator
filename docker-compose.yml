services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opcp-openstack-simulator-app-${USER_ID:-0}-${HTTP_PORT:-5000}
    ports:
      - "${HTTP_PORT:-5000}:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - USER_ID=${USER_ID:-1}
      - USER_NAME=${USER_NAME:-User}
      - USER_EMAIL=${USER_EMAIL:-user@example.com}
      - DESCRIPTION=${DESCRIPTION:-OpenStack Automation}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: opcp-openstack-simulator-nginx-${USER_ID:-0}-${HTTPS_PORT:-5002}
    ports:
      - "${HTTPS_PORT:-5001}:443"
    volumes:
      - ./conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    environment:
      - HTTPS_PORT=${HTTPS_PORT:-5002}
