services:
  app:
    build: .
    container_name: opcp-openstack-simulator-${USER_ID:-0}-${HTTPS_PORT:-5001}
    ports:
      - "${HTTP_PORT:-5000}:5000"
    restart: unless-stopped
    environment:
      - FLASK_ENV=production

  nginx:
    image: nginx:alpine
    container_name: opcp-openstack-simulator-nginx-${USER_ID:-0}-${HTTPS_PORT:-5001}
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./conf/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
